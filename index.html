<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐝 لعبة خلايا النحل</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .home {
      width: min(980px, 94%);
      margin: 2rem auto;
      display: grid;
      gap: 1rem;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.9rem;
    }
    .card {
      padding: 1rem;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      text-decoration: none;
      color: #fff;
      min-height: 120px;
      display: grid;
      place-items: center;
      font-size: 1.25rem;
      font-weight: 800;
    }
    .tools {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <main class="home">
    <section class="surface panel" style="text-align:center;">
      <h1 style="font-size:2.4rem;">🐝 لعبة خلايا النحل</h1>
      <p class="status-text">نسخة محلية (لعبة واحدة) عبر 3 تبويبات</p>
    </section>

    <section class="cards">
      <a class="card" href="display.html">📺 شاشة العرض</a>
      <a class="card" href="referee.html">⚖️ لوحة الحكم</a>
      <a class="card" href="buzzer.html">🔴 البازر</a>
    </section>

    <section class="surface panel">
      <h3>أدوات سريعة</h3>
      <div class="tools">
        <button id="clearStorageBtn" class="btn btn-danger">🗑️ مسح بيانات اللعبة</button>
      </div>
      <p id="clearResult" class="status-text"></p>
    </section>
  </main>

  <script>
    (function () {
      var btn = document.getElementById('clearStorageBtn');
      var out = document.getElementById('clearResult');
      btn.addEventListener('click', function () {
        localStorage.removeItem('hcg_gameState');
        localStorage.removeItem('hcg_playerId');
        localStorage.removeItem('hcg_playerName');
        localStorage.removeItem('hcg_playerTeam');
        localStorage.removeItem('hcg_referee_auth');
        out.textContent = '✅ تم مسح البيانات المحلية.';
      });
    })();
  </script>
</body>
</html>
